name: CI Fast — dev push

# Fast checks on every push to dev: secret scan + build verification.
# The Docusaurus build acts as lint — it fails on broken links and invalid MDX.

on:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  security:
    uses: Illumidragui/.github/.github/workflows/_reusable.code-security.yml@main
    with:
      language: node
      run-tests: false
      run-sonarcloud: false
      run-snyk: false
    secrets: inherit

  build:
    needs: security
    uses: Illumidragui/.github/.github/workflows/_reusable.build-static.yml@main
    with:
      site-url: https://shengjunye.me
    secrets: inherit
