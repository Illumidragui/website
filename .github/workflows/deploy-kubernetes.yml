name: Deploy → Kubernetes (ArgoCD)

# Full security chain before any container reaches the cluster.
# Job graph:
#   gitleaks → snyk → container-build → trivy ──► sign → promote → helm-bump
#                                    └──► sbom ──►
#                                    └──► zap  ──►
#
# sign only runs if trivy AND zap pass.
# promote (kubernetes environment gate) only runs after the image is signed.
# helm-bump updates syesite-chart/values.yaml via yq (not sed) and pushes,
# which triggers ArgoCD auto-sync.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: true

concurrency:
  group: deploy-kubernetes-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # GITLEAKS — blocks everything if secrets are found.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # SNYK — SCA gate before the container is even built.
  # If dependencies have HIGH/CRITICAL CVEs, we stop here.
  # ---------------------------------------------------------------------------
  snyk:
    name: Snyk SCA
    runs-on: ubuntu-latest
    needs: gitleaks
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Snyk scan (save report — HIGH+)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 7
      - name: Snyk enforce — block only CRITICAL
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical

  # ---------------------------------------------------------------------------
  # CONTAINER BUILD — builds the image once with the commit SHA as tag.
  # Docker layer cache (type=gha) cuts repeat build time 40-70%.
  # ---------------------------------------------------------------------------
  container-build:
    name: Build and push container
    runs-on: ubuntu-latest
    needs: snyk
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      image-ref: illumidragui/syesite:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: illumidragui/syesite:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # SBOM — Software Bill of Materials from the built image.
  # Records every package in the container for supply chain audits.
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: container-build
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.container-build.outputs.image-ref }}
          format: spdx-json
          output-file: sbom-${{ github.sha }}.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-${{ github.sha }}.spdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # TRIVY — container vulnerability scan.
  # Pass 1 (blocking): CRITICAL + HIGH with fix available → fails the job.
  # Pass 2 (reporting): all severities as SARIF → GitHub Security tab.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: container-build
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Trivy scan — blocking (CRITICAL + HIGH with fix)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.container-build.outputs.image-ref }}
          format: json
          output: trivy-report.json
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7
      - name: Trivy scan — full SARIF report
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.container-build.outputs.image-ref }}
          format: sarif
          output: trivy-report.sarif
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: false
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-report.sarif
      - name: Trivy summary
        if: always()
        run: |
          echo "## Trivy Container Scan" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-report.json ]; then
            critical=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo "?")
            high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo "?")
            echo "- CRITICAL: $critical | HIGH: $high" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # ZAP — DAST: starts the SHA-tagged image locally and attacks it.
  # Tests the exact binary that will reach the cluster.
  # ---------------------------------------------------------------------------
  zap:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: container-build
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Start app
        run: docker run -d -p 80:80 --name app ${{ needs.container-build.outputs.image-ref }}
      - name: Wait for app to be ready
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:80 && break
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
      - name: ZAP scan (with rules file)
        if: hashFiles('.zap/rules.tsv') != ''
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:80
          fail_action: true
          rules_file_name: .zap/rules.tsv
          artifact_name: zap-report
          cmd_options: '-I'
      - name: ZAP scan (no rules file)
        if: hashFiles('.zap/rules.tsv') == ''
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:80
          fail_action: true
          artifact_name: zap-report
          cmd_options: '-I'
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('zap-report.sarif') != ''
        with:
          sarif_file: zap-report.sarif
      - name: ZAP summary
        if: always()
        run: |
          echo "## OWASP ZAP DAST" >> $GITHUB_STEP_SUMMARY
          if [ -f zap-report.json ]; then
            high=$(jq '[.site[]?.alerts[]? | select(.riskcode=="3")] | length' zap-report.json 2>/dev/null || echo "?")
            medium=$(jq '[.site[]?.alerts[]? | select(.riskcode=="2")] | length' zap-report.json 2>/dev/null || echo "?")
            echo "- HIGH: $high | MEDIUM: $medium" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # SIGN — keyless Cosign signing via GitHub OIDC. No private key needed.
  # Only runs after trivy AND zap both pass. The signature proves this exact
  # image cleared all security gates and was built by this workflow.
  # ---------------------------------------------------------------------------
  sign:
    name: Sign image (Cosign keyless)
    runs-on: ubuntu-latest
    needs: [trivy, zap]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          cosign sign --yes \
            --annotations "git_sha=${{ github.sha }}" \
            --annotations "repo=${{ github.repository }}" \
            --annotations "workflow=${{ github.workflow }}" \
            ${{ needs.container-build.outputs.image-ref }}

  # ---------------------------------------------------------------------------
  # PROMOTE — re-tags the SHA image to latest. Does NOT rebuild.
  # Requires the kubernetes environment gate (manual approval if configured).
  # Only runs after the image is signed.
  # ---------------------------------------------------------------------------
  promote:
    name: Promote SHA → latest
    runs-on: ubuntu-latest
    needs: sign
    timeout-minutes: 10
    environment: kubernetes
    permissions:
      contents: read
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Re-tag SHA as latest
        run: |
          docker pull illumidragui/syesite:${{ github.sha }}
          docker tag  illumidragui/syesite:${{ github.sha }} illumidragui/syesite:latest
          docker push illumidragui/syesite:latest
          echo "Promoted ${{ github.sha }} → latest" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # HELM BUMP — updates image.tag in syesite-chart/values.yaml using yq
  # (not sed — yq is YAML-aware and won't break on formatting changes).
  # The git push triggers ArgoCD auto-sync on the cluster.
  # ---------------------------------------------------------------------------
  helm-bump:
    name: Bump image tag in Helm chart
    runs-on: ubuntu-latest
    needs: promote
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: Illumidragui/devsecops-helm
          token: ${{ secrets.GH_PAT }}
          path: helm-repo
      - name: Install yq
        uses: mikefarah/yq@v4
      - name: Update image tag
        env:
          SHA: ${{ github.sha }}
        run: yq -i '.image.tag = env(SHA)' helm-repo/syesite-chart/values.yaml
      - name: Commit and push
        run: |
          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add syesite-chart/values.yaml
          git commit -m "chore: bump image to ${{ github.sha }}"
          git push
          echo "ArgoCD will auto-sync within ~3 minutes" >> $GITHUB_STEP_SUMMARY
