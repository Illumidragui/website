name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Generate image tag
        id: tag
        run: echo "tag=ga-$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          DOCUSAURUS_CONF_URL: https://shengjunye.me
          DOCKER_IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: build/
          retention-days: 1

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    environment: cloudflare-pages
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: devsecops-v5
          directory: build

  deploy-kubernetes:
    needs: build
    runs-on: ubuntu-latest
    environment: kubernetes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            illumidragui/syesite:${{ needs.build.outputs.image_tag }}
            illumidragui/syesite:latest

      - name: Checkout devsecops-helm
        uses: actions/checkout@v4
        with:
          repository: Illumidragui/devsecops-helm
          token: ${{ secrets.GH_PAT }}
          path: devsecops-helm

      - name: Update image tag in Helm chart
        run: |
          sed -i 's/tag: .*/tag: "${{ needs.build.outputs.image_tag }}"/' \
            devsecops-helm/syesite-chart/values.yaml

      - name: Commit and push
        run: |
          cd devsecops-helm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add syesite-chart/values.yaml
          git commit -m "chore: bump syesite to ${{ needs.build.outputs.image_tag }}"
          git push
