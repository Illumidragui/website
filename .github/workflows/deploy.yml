name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=ga-$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            illumidragui/syesite:${{ steps.tag.outputs.tag }}
            illumidragui/syesite:latest
          build-args: |
            DOCUSAURUS_CONF_URL=https://shengjunye.me
            DOCKER_IMAGE_TAG=${{ steps.tag.outputs.tag }}

  update-helm:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout devsecops-helm
        uses: actions/checkout@v4
        with:
          repository: Illumidragui/devsecops-helm
          token: ${{ secrets.GH_PAT }}

      - name: Update image tag in Helm chart
        run: |
          sed -i 's/tag: .*/tag: "${{ needs.build-and-push.outputs.image_tag }}"/' \
            syesite-chart/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add syesite-chart/values.yaml
          git commit -m "chore: bump syesite to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
