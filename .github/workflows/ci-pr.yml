name: CI PR — Quality Gate

# Full security chain on every PR to main.
#
# Job graph:
#   gitleaks ──► sonarcloud (SAST)    ──► container-build ──► sbom
#            └──► snyk (SCA)          ──►                  └──► trivy ──► sign
#            └──► build (Docusaurus)  ──►                  └──► zap  ──►
#                                                                         └──► security-report
#   dependency-review (parallel, no gate)
#
# container-build only runs if gitleaks, sonarcloud, snyk, and build all pass.
# sign only runs if trivy AND zap both pass — the signed image proves all gates cleared.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # GITLEAKS — blocks everything if any secret is found in commit history.
  # Runs first; a leaked secret invalidates every downstream result.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # DEPENDENCY REVIEW — checks PRs for packages with known CVEs.
  # Runs in parallel with gitleaks; blocks on HIGH and CRITICAL CVEs.
  # Posts a summary comment directly on the PR.
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ---------------------------------------------------------------------------
  # SONARCLOUD — SAST on source code. Findings appear in the GitHub Security tab
  # and on the SonarCloud project dashboard.
  # ---------------------------------------------------------------------------
  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    needs: gitleaks
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sonarsource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=illumidragui
            -Dsonar.projectKey=Illumidragui_website

  # ---------------------------------------------------------------------------
  # SNYK — SCA on npm dependencies. Two-pass pattern:
  #   Pass 1 (continue-on-error): saves the JSON report even on failure.
  #   Pass 2 (strict):            enforces the HIGH threshold; fails the job.
  # ---------------------------------------------------------------------------
  snyk:
    name: Snyk SCA
    runs-on: ubuntu-latest
    needs: gitleaks
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Snyk scan (save report — HIGH+)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 7
      - name: Snyk enforce — block only CRITICAL
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # HIGH CVEs in Docusaurus 2.x (undici, shell-quote) are build-time only.
          # The deployed Docker image is pure static HTML — no Node process runs in prod.
          # Block on CRITICAL; HIGH findings are still captured in the report above.
          args: --severity-threshold=critical
      - name: Snyk summary
        if: always()
        run: |
          echo "## Snyk SCA" >> $GITHUB_STEP_SUMMARY
          if [ -f snyk-report.json ]; then
            high=$(jq '[.vulnerabilities[]? | select(.severity=="high")] | length' snyk-report.json 2>/dev/null || echo "?")
            critical=$(jq '[.vulnerabilities[]? | select(.severity=="critical")] | length' snyk-report.json 2>/dev/null || echo "?")
            echo "- HIGH: $high | CRITICAL: $critical" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # BUILD — Docusaurus production build. Validates MDX and catches broken links.
  # Also runs in parallel after gitleaks.
  # ---------------------------------------------------------------------------
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    needs: gitleaks
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          DOCUSAURUS_CONF_URL: https://shengjunye.me
          DOCKER_IMAGE_TAG: ${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: build/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # CONTAINER BUILD — builds the Docker image once with the commit SHA as tag.
  # Only runs after code security (sonarcloud + snyk) and build all pass.
  # Docker layer cache via GitHub Actions Cache cuts repeat build time 40-70%.
  # ---------------------------------------------------------------------------
  container-build:
    name: Build and push container
    runs-on: ubuntu-latest
    needs: [build, sonarcloud, snyk]
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      image-ref: illumidragui/syesite:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: illumidragui/syesite:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # SBOM — generates a Software Bill of Materials from the container image.
  # Produces a SPDX-JSON file listing every package in the image.
  # Useful for supply chain audits, compliance, and vulnerability tracking.
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: container-build
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.container-build.outputs.image-ref }}
          format: spdx-json
          output-file: sbom-${{ github.sha }}.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-${{ github.sha }}.spdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # TRIVY — container image vulnerability scanner.
  # Pass 1 (blocking): CRITICAL + HIGH with an available fix → fails the job.
  # Pass 2 (reporting): all severities as SARIF → GitHub Security tab.
  # ignore-unfixed in pass 1 prevents blocking on CVEs without upstream patches.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: container-build
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Trivy scan — blocking (CRITICAL + HIGH with fix)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.container-build.outputs.image-ref }}
          format: json
          output: trivy-report.json
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7
      - name: Trivy scan — full SARIF report
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.container-build.outputs.image-ref }}
          format: sarif
          output: trivy-report.sarif
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: false
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-report.sarif
      - name: Trivy summary
        if: always()
        run: |
          echo "## Trivy Container Scan" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-report.json ]; then
            critical=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo "?")
            high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo "?")
            echo "- CRITICAL: $critical | HIGH: $high" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # ZAP — DAST: pulls the SHA-tagged image from Docker Hub, starts it locally,
  # and attacks it with OWASP ZAP. Tests the exact binary that will be deployed.
  # fail_action: true ensures ZAP findings actually block the pipeline.
  # ---------------------------------------------------------------------------
  zap:
    name: OWASP ZAP DAST
    runs-on: ubuntu-latest
    needs: container-build
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Start app
        run: docker run -d -p 80:80 --name app ${{ needs.container-build.outputs.image-ref }}
      - name: Wait for app to be ready
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:80 && break
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
      - name: ZAP scan (with rules file)
        if: hashFiles('.zap/rules.tsv') != ''
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:80
          fail_action: true
          rules_file_name: .zap/rules.tsv
          artifact_name: zap-report
          cmd_options: '-I'
      - name: ZAP scan (no rules file)
        if: hashFiles('.zap/rules.tsv') == ''
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:80
          fail_action: true
          artifact_name: zap-report
          cmd_options: '-I'
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('zap-report.sarif') != ''
        with:
          sarif_file: zap-report.sarif
      - name: ZAP summary
        if: always()
        run: |
          echo "## OWASP ZAP DAST" >> $GITHUB_STEP_SUMMARY
          if [ -f zap-report.json ]; then
            high=$(jq '[.site[]?.alerts[]? | select(.riskcode=="3")] | length' zap-report.json 2>/dev/null || echo "?")
            medium=$(jq '[.site[]?.alerts[]? | select(.riskcode=="2")] | length' zap-report.json 2>/dev/null || echo "?")
            echo "- HIGH: $high | MEDIUM: $medium" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # SIGN — keyless image signing with Cosign (Sigstore).
  # Only runs if trivy AND zap both pass — the signature proves the exact image
  # cleared all security gates. Uses GitHub OIDC (no private key needed).
  # Verify with:
  #   cosign verify \
  #     --certificate-identity "https://github.com/Illumidragui/website/.github/workflows/ci-pr.yml@refs/heads/main" \
  #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
  #     docker.io/illumidragui/syesite:<sha>
  # ---------------------------------------------------------------------------
  sign:
    name: Sign image (Cosign keyless)
    runs-on: ubuntu-latest
    needs: [trivy, zap]
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: |
          cosign sign --yes \
            --annotations "git_sha=${{ github.sha }}" \
            --annotations "repo=${{ github.repository }}" \
            --annotations "workflow=${{ github.workflow }}" \
            ${{ needs.container-build.outputs.image-ref }}

  # ---------------------------------------------------------------------------
  # SECURITY REPORT — consolidated summary of all scanner results.
  # Runs even when scanners fail (if: always()) so findings are always visible.
  # ---------------------------------------------------------------------------
  security-report:
    name: Consolidated Security Report
    runs-on: ubuntu-latest
    needs: [gitleaks, dependency-review, sonarcloud, snyk, trivy, zap, sbom, sign]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
        continue-on-error: true
      - name: Summary
        run: |
          echo "# Security Report — PR #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "SHA: \`${{ github.sha }}\` | Run: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud SAST | ${{ needs.sonarcloud.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Snyk SCA | ${{ needs.snyk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP | ${{ needs.zap.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign Sign | ${{ needs.sign.result }} |" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: all-reports/
          retention-days: 7
