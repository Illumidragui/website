name: Deploy → Cloudflare Pages

# Triggered on every push to main. Gitleaks gates before build.
# Cloudflare Pages deploys are idempotent — concurrent runs are cancelled.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    needs: gitleaks
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          DOCUSAURUS_CONF_URL: https://shengjunye.me
      - uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: build/
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: cloudflare-pages
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: build/
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/ --project-name=shengsite
